<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0d1117;
            --tile-bg: rgba(255, 255, 255, 0.05);
            --border-color: #30363d;
            --text-color: #f0f6fc;
            --accent-color: #58a6ff;
            --trans-white: rgba(255, 255, 255, 0.08);
        }

        /* 전체 화면 및 정렬 설정 */
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Pretendard', -apple-system, sans-serif;
            margin: 0;
            padding: 30px;
            display: flex;
            justify-content: center;
            align-items: center; /* 위아래 정중앙 배치 */
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* 전체 프레임 크기 대폭 확대 (1100px -> 1500px) */
        .main-wrapper {
            width: 95%; /* 화면 너비의 95%까지 꽉 차게 */
            max-width: 1500px; /* 최대 크기 제한을 크게 늘림 */
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        /* 상단 아이콘 바 & 커뮤니티 폴더 */
        .icon-bar {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }

        .icon-link {
            background: var(--trans-white);
            backdrop-filter: blur(8px);
            width: 55px;
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            text-decoration: none;
            color: white;
            font-size: 22px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            position: relative;
        }

        .icon-link:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-4px);
            border-color: var(--accent-color);
        }

        /* 커뮤니티 드롭다운 (폴더) */
        .community-folder {
            position: relative;
            display: inline-block;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            top: 100%; /* 아이콘 바로 아래에 위치 */
            right: 0;
            background: rgba(22, 27, 34, 0.95);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            min-width: 160px;
            z-index: 100;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            overflow: hidden;
            pointer-events: auto; /* 마우스 이벤트를 확실히 받도록 설정 */
        }

        /* ⭐️ 문제 해결: 아이콘과 드롭다운 사이의 여백을 메우는 브리지 가상 요소 추가 */
        .community-folder::before {
            content: '';
            position: absolute;
            top: 55px; /* 아이콘 높이와 동일하게 설정 */
            left: 0;
            width: 100%;
            height: 15px; /* 아이콘 바의 gap과 동일하게 설정 */
            display: none;
            z-index: 99; /* 드롭다운보다 약간 낮게 설정 */
        }

        .community-folder:hover::before {
            display: block; /* 마우스를 올리면 브리지가 나타남 */
        }

        .dropdown-content a {
            color: var(--text-color);
            padding: 12px 20px;
            text-decoration: none;
            display: block;
            font-size: 14px;
            transition: background 0.2s;
        }

        .dropdown-content a:hover {
            background: rgba(88, 166, 255, 0.1);
            color: var(--accent-color);
        }

        .community-folder:hover .dropdown-content {
            display: block;
        }

        /* 검색창 (구글/네이버) */
        .search-container {
            display: flex;
            gap: 20px;
            width: 100%;
        }

        .search-box {
            flex: 1;
            background: var(--tile-bg);
            padding: 16px 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            transition: border-color 0.3s;
        }

        .search-box:focus-within { border-color: var(--accent-color); }

        .search-box i { margin-right: 15px; color: #8b949e; width: 20px; text-align: center; }

        .search-box input {
            width: 100%;
            background: transparent;
            border: none;
            color: white;
            outline: none;
            font-size: 16px;
        }

        /* 구글 캘린더 (너비 비례 자동 조절) */
        .calendar-container {
            width: 100%;
            position: relative;
            background: #161b22;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            /* 가로:세로 16:8 비율. 너비가 넓어지면 캘린더가 위아래로 너무 커지지 않도록 비율 조정 */
            aspect-ratio: 16 / 8; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .calendar-container iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: 0;
            /* 캘린더 다크 모드 시각화 필터 */
            filter: invert(90%) hue-rotate(180deg) brightness(1.1);
        }

        /* 모바일 대응 */
        @media (max-width: 768px) {
            .search-container { flex-direction: column; }
            .calendar-container { aspect-ratio: 1 / 1.2; }
            body { padding: 40px 20px; align-items: flex-start; }
            .main-wrapper { max-width: 100%; width: 100%; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="icon-bar">
            <a href="https://google.com" class="icon-link" title="Google"><i class="fab fa-google"></i></a>
            <a href="https://youtube.com" class="icon-link" title="Youtube"><i class="fab fa-youtube"></i></a>
            <a href="https://gemini.google.com" class="icon-link" title="Gemini"><i class="fa-solid fa-wand-magic-sparkles"></i></a>
            <a href="https://notebooklm.google.com" class="icon-link" title="NotebookLM"><i class="fa-solid fa-book-open"></i></a>
            <a href="https://claude.ai" class="icon-link" title="Claude"><i class="fa-solid fa-robot"></i></a>
            <a href="https://notion.so" class="icon-link" title="Notion"><i class="fa-solid fa-n"></i></a>
            <a href="https://icloud.com" class="icon-link" title="iCloud"><i class="fa-solid fa-cloud"></i></a>
            
            <div class="community-folder">
                <a href="#" class="icon-link" title="Community"><i class="fa-solid fa-users"></i></a>
                <div class="dropdown-content">
                    <a href="https://www.fmkorea.com/" target="_blank">Football</a>
                    <a href="https://mlbpark.donga.com/mp/b.php?b=bullpen" target="_blank">Baseball</a>
                </div>
            </div>
        </div>

        <div class="search-container">
            <form class="search-box" action="https://www.google.com/search" method="GET">
                <i class="fab fa-google"></i>
                <input type="text" name="q" placeholder="Google 검색">
            </form>
            <form class="search-box" action="https://search.naver.com/search.naver" method="GET">
                <i class="fa-solid fa-n"></i>
                <input type="text" name="query" placeholder="Naver 검색">
            </form>
        </div>

        <div class="calendar-container">
            <iframe src="https://calendar.google.com/calendar/embed?src=timsungmook%40gmail.com&ctz=Asia%2FSeoul" scrolling="no"></iframe>
        </div>
    </div>

</body>
</html>
