<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>My Dark Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #0d1117; /* 깃허브 다크 모드 배경색 */
            color: #f0f6fc;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 상단 아이콘 링크 섹션 */
        .icon-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            padding: 15px;
        }
        .icon-link {
            background: rgba(255, 255, 255, 0.1); /* 반투명 배경 */
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            text-decoration: none;
            color: #ffffff;
            font-size: 24px;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }
        .icon-link:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-3px);
        }

        /* 검색창 섹션 */
        .search-container {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 900px;
            margin-bottom: 30px;
        }
        .search-box {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid #30363d;
        }
        .search-box input {
            width: 100%;
            background: transparent;
            border: none;
            color: white;
            padding: 10px;
            outline: none;
            font-size: 16px;
        }
        .search-box h3 { margin: 0 0 10px 10px; font-size: 14px; color: #8b949e; }

        /* 캘린더 섹션 */
        .calendar-wrap {
            width: 100%;
            max-width: 900px;
            background: #161b22;
            padding: 10px;
            border-radius: 20px;
            border: 1px solid #30363d;
        }
        iframe {
            width: 100%;
            height: 550px;
            border: none;
            border-radius: 15px;
            filter: invert(90%) hue-rotate(180deg); /* 캘린더를 강제로 다크모드처럼 보이게 함 */
        }
    </style>
</head>
<body>

    <div class="icon-bar">
        <a href="https://google.com" class="icon-link" title="Google"><i class="fab fa-google"></i></a>
        <a href="https://youtube.com" class="icon-link" title="Youtube"><i class="fab fa-youtube"></i></a>
        <a href="https://gemini.google.com" class="icon-link" title="Gemini"><i class="fa-solid fa-wand-magic-sparkles"></i></a>
        <a href="https://notebooklm.google.com" class="icon-link" title="NotebookLM"><i class="fa-solid fa-book-open"></i></a>
        <a href="https://claude.ai" class="icon-link" title="Claude"><i class="fa-solid fa-robot"></i></a>
        <a href="https://notion.so" class="icon-link" title="Notion"><i class="fa-solid fa-n"></i></a>
        <a href="https://icloud.com" class="icon-link" title="iCloud"><i class="fa-solid fa-cloud"></i></a>
    </div>

    <div class="search-container">
        <div class="search-box">
            <h3>Google Search</h3>
            <form action="https://www.google.com/search" method="GET">
                <input type="text" name="q" placeholder="Google에서 검색...">
            </form>
        </div>
        <div class="search-box">
            <h3>Naver Search</h3>
            <form action="https://search.naver.com/search.naver" method="GET">
                <input type="text" name="query" placeholder="Naver에서 검색...">
            </form>
        </div>
    </div>

    <div class="calendar-wrap">
        <iframe src="여기에_본인의_구글_캘린더_주소를_넣으세요"></iframe>
    </div>

</body>
</html>
