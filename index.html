<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0d1117;
            --tile-bg: rgba(255, 255, 255, 0.05);
            --border-color: #30363d;
            --text-color: #f0f6fc;
            --accent-color: #58a6ff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Pretendard', -apple-system, sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 1. 상단 아이콘 링크 섹션 (반투명) */
        .icon-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .icon-link {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(8px);
            width: 55px;
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            text-decoration: none;
            color: white;
            font-size: 22px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }

        .icon-link:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-4px);
            border-color: var(--accent-color);
        }

        /* 2. 검색창 섹션 (구글/네이버) */
        .search-container {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 1100px;
            margin-bottom: 40px;
        }

        .search-box {
            flex: 1;
            background: var(--tile-bg);
            padding: 12px 20px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
        }

        .search-box i {
            margin-right: 15px;
            color: #8b949e;
        }

        .search-box input {
            width: 100%;
            background: transparent;
            border: none;
            color: white;
            outline: none;
            font-size: 16px;
        }

        /* 3. 구글 캘린더 섹션 (너비 꽉 차게 & 비율 유지) */
        .calendar-container {
            width: 100%;
            max-width: 1100px;
            position: relative;
            background: #161b22;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            /* 너비에 비례해 높이 설정 (가로:세로 16:10 비율) */
            aspect-ratio: 16 / 10; 
        }

        .calendar-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
            /* 캘린더 다크 필터 */
            filter: invert(90%) hue-rotate(180deg) brightness(1.1);
        }

        @media (max-width: 768px) {
            .search-container { flex-direction: column; }
            .calendar-container { aspect-ratio: 1 / 1.2; } /* 모바일에서는 세로로 길게 */
        }
    </style>
</head>
<body>

    <div class="icon-bar">
        <a href="https://google.com" class="icon-link"><i class="fab fa-google"></i></a>
        <a href="https://youtube.com" class="icon-link"><i class="fab fa-youtube"></i></a>
        <a href="https://gemini.google.com" class="icon-link"><i class="fa-solid fa-wand-magic-sparkles"></i></a>
        <a href="https://notebooklm.google.com" class="icon-link"><i class="fa-solid fa-book-open"></i></a>
        <a href="https://claude.ai" class="icon-link"><i class="fa-solid fa-robot"></i></a>
        <a href="https://notion.so" class="icon-link"><i class="fa-solid fa-n"></i></a>
        <a href="https://icloud.com" class="icon-link"><i class="fa-solid fa-cloud"></i></a>
    </div>

    <div class="search-container">
        <form class="search-box" action="https://www.google.com/search" method="GET">
            <i class="fab fa-google"></i>
            <input type="text" name="q" placeholder="Google 검색">
        </form>
        <form class="search-box" action="https://search.naver.com/search.naver" method="GET">
            <i class="fa-solid fa-n"></i>
            <input type="text" name="query" placeholder="Naver 검색">
        </form>
    </div>

    <div class="calendar-container">
        <iframe src="https://calendar.google.com/calendar/embed?src=timsungmook%40gmail.com&ctz=Asia%2FSeoul" scrolling="no"></iframe>
    </div>

</body>
</html>
