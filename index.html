<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0d1117;
            --tile-bg: rgba(255, 255, 255, 0.05);
            --border-color: #30363d;
            --text-color: #f0f6fc;
            --accent-color: #58a6ff;
            --trans-white: rgba(255, 255, 255, 0.08);
        }

        /* 전체 화면 및 정렬 설정 */
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Pretendard', -apple-system, sans-serif;
            margin: 0;
            padding: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        /* 전체 프레임 크기 (최대 1500px) */
        .main-wrapper {
            width: 95%;
            max-width: 1500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 50px; 
        }

        /* 아이콘 바: 간격 대폭 확대 (gap: 60px) */
        .icon-bar {
            display: flex;
            gap: 50px; 
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
        }

        /* 아이콘과 텍스트를 묶어주는 래퍼 */
        .icon-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px; 
        }

        /* 아이콘 크기 확대 (70px) */
        .icon-link {
            background: var(--trans-white);
            backdrop-filter: blur(8px);
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 18px;
            text-decoration: none;
            /* 기본 컬러 설정을 지우고 각 아이콘 본연의 색이 나오도록 변경 */
            font-size: 32px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            position: relative;
        }

        .icon-link:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-5px);
            border-color: var(--accent-color);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }

        /* 아이콘 아래 텍스트 라벨 */
        .icon-label {
            font-size: 14px;
            color: #8b949e;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-transform: capitalize;
        }

        /* 커뮤니티 드롭다운 (폴더) */
        .community-folder {
            position: relative;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            top: 100%; 
            margin-top: 10px; 
            right: 0;
            background: rgba(22, 27, 34, 0.95);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            min-width: 160px;
            z-index: 100;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            overflow: hidden;
            pointer-events: auto;
        }

        /* 마우스 호버 브리지 */
        .community-folder::before {
            content: '';
            position: absolute;
            top: 70px; 
            left: 0;
            width: 100%;
            height: 45px; 
            display: none;
            z-index: 99;
        }

        .community-folder:hover::before { display: block; }
        .community-folder:hover .dropdown-content { display: block; }

        .dropdown-content a {
            color: var(--text-color);
            padding: 14px 20px;
            text-decoration: none;
            display: block;
            font-size: 15px;
            transition: background 0.2s;
        }

        .dropdown-content a:hover {
            background: rgba(88, 166, 255, 0.1);
            color: var(--accent-color);
        }

        /* 검색창 (구글/네이버) */
        .search-container {
            display: flex;
            gap: 20px;
            width: 100%;
        }

        .search-box {
            flex: 1;
            background: var(--tile-bg);
            padding: 18px 24px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            transition: border-color 0.3s;
        }

        .search-box:focus-within { border-color: var(--accent-color); }

        /* ⭐️ 검색창 안의 링크 아이콘 설정 */
        .search-link {
            margin-right: 15px; 
            width: 24px; 
            text-align: center;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-link i { 
            font-size: 18px; 
            transition: transform 0.2s ease;
        }

        /* 마우스 올리면 아이콘 살짝 커짐 */
        .search-link:hover i {
            transform: scale(1.2);
        }

        .search-box input {
            width: 100%;
            background: transparent;
            border: none;
            color: white;
            outline: none;
            font-size: 17px;
        }
        /* 구글 캘린더 (너비 비례 자동 조절) */
        .calendar-container {
            width: 100%;
            position: relative;
            background: #161b22;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            aspect-ratio: 16 / 8; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .calendar-container iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: 0;
            filter: invert(90%) hue-rotate(180deg) brightness(1.1);
        }

        /* 모바일 대응 */
        @media (max-width: 768px) {
            .search-container { flex-direction: column; }
            .calendar-container { aspect-ratio: 1 / 1.2; }
            body { padding: 40px 20px; align-items: flex-start; }
            .main-wrapper { max-width: 100%; width: 100%; }
            .icon-bar { gap: 20px; }
            .icon-link { width: 60px; height: 60px; font-size: 26px; }
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="icon-bar">
            <!-- 각 아이콘에 style="color: #색상코드;" 를 추가하여 오리지널 컬러 부여 -->
            <div class="icon-wrapper">
                <a href="https://mail.google.com" class="icon-link" title="G Mail"><i class="fab fa-google" style="color: #EA4335;"></i></a>
                <span class="icon-label">G Mail</span>
            </div>
            
            <div class="icon-wrapper">
                <a href="https://youtube.com" class="icon-link" title="Youtube"><i class="fab fa-youtube" style="color: #FF0000;"></i></a>
                <span class="icon-label">YouTube</span>
            </div>
            
            <div class="icon-wrapper">
                <a href="https://gemini.google.com" class="icon-link" title="Gemini"><i class="fa-solid fa-wand-magic-sparkles" style="color: #8E24AA;"></i></a>
                <span class="icon-label">Gemini</span>
            </div>
            
            <div class="icon-wrapper">
                <a href="https://notebooklm.google.com" class="icon-link" title="NotebookLM"><i class="fa-solid fa-book-open" style="color: #4285F4;"></i></a>
                <span class="icon-label">NotebookLM</span>
            </div>
            
            <div class="icon-wrapper">
                <a href="https://claude.ai" class="icon-link" title="Claude"><i class="fa-solid fa-robot" style="color: #D97757;"></i></a>
                <span class="icon-label">Claude</span>
            </div>
            
            <div class="icon-wrapper">
                <a href="https://notion.so" class="icon-link" title="Notion"><i class="fa-solid fa-n" style="color: #FFFFFF;"></i></a>
                <span class="icon-label">Notion</span>
            </div>
            
            <div class="icon-wrapper">
                <a href="https://icloud.com" class="icon-link" title="iCloud"><i class="fa-solid fa-cloud" style="color: #3CABFF;"></i></a>
                <span class="icon-label">iCloud</span>
            </div>
            
            <div class="icon-wrapper community-folder">
                <a href="#" class="icon-link" title="Folder"><i class="fa-solid fa-users" style="color: #F4D03F;"></i></a>
                <span class="icon-label">Folder</span>
                <div class="dropdown-content">
                    <a href="https://www.fmkorea.com/" target="_blank">Football</a>
                    <a href="https://mlbpark.donga.com/mp/b.php?b=bullpen" target="_blank">Baseball</a>
                </div>
            </div>
        </div>

        <div class="search-container">
            <!-- ⭐️ 구글 아이콘 링크 추가 -->
            <form class="search-box" action="https://www.google.com/search" method="GET">
                <a href="https://www.google.com" class="search-link" title="Google 메인으로 이동">
                    <i class="fab fa-google" style="color: #4285F4;"></i>
                </a>
                <input type="text" name="q" placeholder="Google 검색">
            </form>
            <!-- ⭐️ 네이버 아이콘 링크 추가 -->
            <form class="search-box" action="https://search.naver.com/search.naver" method="GET">
                <a href="https://www.naver.com" class="search-link" title="Naver 메인으로 이동">
                    <i class="fa-solid fa-n" style="color: #03C75A;"></i>
                </a>
                <input type="text" name="query" placeholder="Naver 검색">
            </form>
        </div>

        <div class="calendar-container">
            <iframe src="https://calendar.google.com/calendar/embed?src=timsungmook%40gmail.com&ctz=Asia%2FSeoul" scrolling="no"></iframe>
        </div>
    </div>

</body>
</html>
